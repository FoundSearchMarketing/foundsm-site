name: Build Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Site and Sanity Studio build
    runs-on: ubuntu-latest
    env:
      SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
      SANITY_DATASET: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Sanity Studio dependencies
        run: bun install --cwd studio

      - name: Build Sanity Studio
        run: bun run --cwd studio build
